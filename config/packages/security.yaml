# config/packages/security.yaml
security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_MANAGER, ROLE_STAFF, ROLE_USER]
        ROLE_ADMIN:       [ROLE_MANAGER, ROLE_STAFF, ROLE_USER]
        ROLE_MANAGER:     [ROLE_STAFF, ROLE_USER]
        ROLE_STAFF:       [ROLE_USER]
        ROLE_GROOMER:     [ROLE_STAFF, ROLE_USER]
        ROLE_RECEPTIONIST: [ROLE_STAFF, ROLE_USER]
        ROLE_VETERINARIAN: [ROLE_STAFF, ROLE_USER]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginFormAuthenticator
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: false
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    # Easy way to control access for large sections of your site
    # Note: Only the first* access control that matches will be used
    access_control:
        - { path: ^/api/customers, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/manager, roles: ROLE_MANAGER }
        - { path: ^/staff, roles: ROLE_STAFF }
        - { path: ^/activity-logs/my-activities, roles: ROLE_USER }
        - { path: ^/activity-logs/dashboard-stats, roles: ROLE_STAFF }
        - { path: ^/activity-logs/search, roles: ROLE_ADMIN }
        - { path: ^/activity-logs/clear-old, roles: ROLE_ADMIN }
        - { path: ^/activity-logs/, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon